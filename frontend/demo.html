<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recommendation Engine Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0a0f;
    --surface:  #111118;
    --card:     #16161f;
    --border:   rgba(255,255,255,0.07);
    --text:     #e8e8f0;
    --muted:    #6b6b80;
    --accent:   #e8c547;
    --accent2:  #5b8af0;
    --accent3:  #e05a7a;
    --vector:   #5b8af0;
    --collab:   #7ecfa0;
    --trending: #e8a247;
    --radius:   12px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Noise grain overlay ── */
  body::before {
    content:'';
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.4;
  }

  /* ── Background glow ── */
  .bg-glow {
    position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
    width: 800px; height: 400px; border-radius: 50%;
    background: radial-gradient(ellipse, rgba(91,138,240,0.08) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  /* ── Layout ── */
  .wrapper { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 0 24px 80px; }

  /* ── Header ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 28px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px; letter-spacing: 3px;
    color: var(--accent);
  }
  .logo span { color: var(--text); opacity: 0.5; }

  .header-meta {
    display: flex; align-items: center; gap: 20px;
    font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace;
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%; background: #7ecfa0;
    animation: pulse 2s ease-in-out infinite;
    display: inline-block; margin-right: 6px;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── User selector ── */
  .user-bar {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 20px;
    margin-bottom: 32px; gap: 16px; flex-wrap: wrap;
  }
  .user-bar label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }

  .user-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
  .user-tab {
    padding: 7px 16px; border-radius: 20px; font-size: 13px; font-weight: 500;
    border: 1px solid var(--border); background: transparent; color: var(--muted);
    cursor: pointer; transition: all 0.2s;
  }
  .user-tab:hover { border-color: var(--accent); color: var(--accent); }
  .user-tab.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

  .device-tabs { display: flex; gap: 8px; }
  .device-tab {
    padding: 7px 14px; border-radius: 8px; font-size: 12px;
    border: 1px solid var(--border); background: transparent; color: var(--muted);
    cursor: pointer; transition: all 0.2s;
  }
  .device-tab.active { border-color: var(--accent2); color: var(--accent2); background: rgba(91,138,240,0.1); }

  .fetch-btn {
    padding: 9px 22px; border-radius: 8px; font-size: 13px; font-weight: 500;
    background: var(--accent); color: var(--bg); border: none;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: all 0.2s; white-space: nowrap;
  }
  .fetch-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(232,197,71,0.3); }
  .fetch-btn:active { transform: translateY(0); }
  .fetch-btn.loading { opacity: 0.6; pointer-events: none; }

  /* ── Context bar ── */
  .context-bar {
    display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap;
    opacity: 0; transform: translateY(8px); transition: all 0.4s;
  }
  .context-bar.visible { opacity: 1; transform: translateY(0); }

  .ctx-chip {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 6px 14px; font-size: 12px;
  }
  .ctx-chip .icon { font-size: 14px; }
  .ctx-chip .label { color: var(--muted); margin-right: 2px; }
  .ctx-chip .value { font-family: 'DM Mono', monospace; color: var(--accent); }

  /* ── Source legend ── */
  .legend {
    display: flex; gap: 20px; margin-bottom: 28px; flex-wrap: wrap;
    opacity: 0; transition: opacity 0.4s 0.2s;
  }
  .legend.visible { opacity: 1; }
  .legend-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px;
  }

  /* ── Movie card ── */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    cursor: pointer; position: relative;
    transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
    opacity: 0; transform: translateY(20px);
  }
  .card.in { opacity: 1; transform: translateY(0); }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    border-color: rgba(255,255,255,0.14);
    z-index: 2;
  }

  .card-poster {
    width: 100%; aspect-ratio: 2/3; overflow: hidden;
    position: relative; background: #1c1c28;
  }
  .card-poster img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
  .card:hover .card-poster img { transform: scale(1.04); }

  /* Score badge */
  .score-badge {
    position: absolute; top: 10px; right: 10px;
    background: rgba(0,0,0,0.75); backdrop-filter: blur(6px);
    border-radius: 6px; padding: 4px 8px;
    font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500;
    color: var(--accent);
  }

  /* Source pill */
  .source-pill {
    position: absolute; top: 10px; left: 10px;
    border-radius: 4px; padding: 3px 7px;
    font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
    font-weight: 500; font-family: 'DM Mono', monospace;
  }
  .source-vector    { background: rgba(91,138,240,0.85); color: #fff; }
  .source-collab    { background: rgba(126,207,160,0.85); color: #0a0a0f; }
  .source-trending  { background: rgba(232,162,71,0.85); color: #0a0a0f; }

  /* Card body */
  .card-body { padding: 14px; }
  .card-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; line-height: 1.3; }
  .card-meta { font-size: 11px; color: var(--muted); margin-bottom: 10px; }

  /* Explain chip */
  .explain {
    font-size: 11px; line-height: 1.45;
    color: rgba(232,232,240,0.6);
    padding: 8px 10px;
    background: rgba(255,255,255,0.04);
    border-left: 2px solid var(--border);
    border-radius: 0 4px 4px 0;
  }
  .card:hover .explain { border-left-color: var(--accent2); color: rgba(232,232,240,0.85); }

  /* ── Detail modal ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px); z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 24px; opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--card); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; max-width: 640px; width: 100%;
    max-height: 90vh; overflow-y: auto;
    transform: translateY(16px) scale(0.98); transition: transform 0.3s;
  }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }

  .modal-inner { display: flex; gap: 0; }
  .modal-poster { width: 200px; flex-shrink: 0; }
  .modal-poster img { width: 100%; height: 100%; object-fit: cover; border-radius: 16px 0 0 16px; }
  .modal-content { padding: 28px; flex: 1; }

  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; letter-spacing: 2px;
    margin-bottom: 4px; line-height: 1.1;
  }
  .modal-year { font-size: 13px; color: var(--muted); margin-bottom: 14px; }

  .modal-genres { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .genre-tag {
    padding: 3px 10px; border-radius: 4px; font-size: 11px;
    background: rgba(255,255,255,0.07); color: var(--muted);
    letter-spacing: 0.5px;
  }

  .modal-overview { font-size: 13px; line-height: 1.65; color: rgba(232,232,240,0.7); margin-bottom: 20px; }

  .modal-divider { height: 1px; background: var(--border); margin-bottom: 18px; }

  .explain-section-title {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 10px;
  }

  .explain-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
  .explain-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .explain-text { font-size: 13px; line-height: 1.5; color: rgba(232,232,240,0.8); }

  .score-row { display: flex; align-items: center; gap: 12px; margin-top: 16px; }
  .score-label { font-size: 11px; color: var(--muted); }
  .score-bar-wrap { flex: 1; height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
  .score-bar { height: 100%; border-radius: 2px; background: var(--accent); transition: width 0.8s cubic-bezier(.17,.67,.35,1.1); }
  .score-val { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--accent); }

  .modal-close {
    position: absolute; top: 16px; right: 16px;
    background: rgba(255,255,255,0.08); border: none;
    width: 32px; height: 32px; border-radius: 50%;
    color: var(--muted); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .modal-close:hover { background: rgba(255,255,255,0.15); color: var(--text); }

  /* ── Like button ── */
  .like-btn {
    display: inline-flex; align-items: center; gap: 7px;
    margin-top: 18px; padding: 9px 18px; border-radius: 8px; font-size: 13px;
    background: rgba(232,197,71,0.12); border: 1px solid rgba(232,197,71,0.3);
    color: var(--accent); cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .like-btn:hover { background: rgba(232,197,71,0.22); transform: translateY(-1px); }
  .like-btn.liked { background: var(--accent); color: var(--bg); border-color: var(--accent); }

  /* ── API panel ── */
  .api-panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px 24px; margin-bottom: 32px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .api-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
  .api-input {
    flex: 1; min-width: 200px; background: rgba(255,255,255,0.05);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 12px; color: var(--text); font-family: 'DM Mono', monospace;
    font-size: 12px; outline: none; transition: border-color 0.2s;
  }
  .api-input:focus { border-color: var(--accent2); }
  .api-toggle {
    padding: 8px 14px; border-radius: 6px; font-size: 12px;
    border: 1px solid var(--border); background: transparent; color: var(--muted);
    cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif;
    white-space: nowrap;
  }
  .api-toggle.active { border-color: var(--accent2); color: var(--accent2); background: rgba(91,138,240,0.1); }

  /* ── Empty / loading ── */
  .empty {
    grid-column: 1/-1; padding: 60px; text-align: center; color: var(--muted);
  }
  .empty .big { font-family: 'Bebas Neue', sans-serif; font-size: 48px; color: rgba(255,255,255,0.05); letter-spacing: 4px; }

  .skeleton {
    background: linear-gradient(90deg, var(--card) 25%, rgba(255,255,255,0.04) 50%, var(--card) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: var(--radius);
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  .skel-card { height: 320px; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

  @media (max-width: 600px) {
    .modal-inner { flex-direction: column; }
    .modal-poster { width: 100%; height: 200px; }
    .modal-poster img { border-radius: 16px 16px 0 0; height: 200px; }
    header { flex-direction: column; gap: 12px; align-items: flex-start; }
  }
</style>
</head>
<body>

<div class="bg-glow"></div>

<div class="wrapper">

  <!-- Header -->
  <header>
    <div class="header-meta">
      <span><span class="status-dot"></span>MongoDB Atlas connected</span>
      <span>Gemini Embedding 2 · 3072-dim</span>
    </div>
  </header>

  <!-- API config panel -->
  <div class="api-panel">
    <span class="api-label">API Base</span>
    <input class="api-input" id="apiBase" value="http://localhost:8080" placeholder="http://localhost:8080" />
    <button class="api-toggle active" id="mockToggle" onclick="toggleMock()">
      Mock data ON
    </button>
  </div>

  <!-- User bar -->
  <div class="user-bar">
    <div>
      <div class="api-label" style="margin-bottom:10px">User</div>
      <div class="user-tabs" id="userTabs">
        <button class="user-tab active" onclick="selectUser('u_thriller_fan', this)">🎭 Thriller Fan</button>
        <button class="user-tab" onclick="selectUser('u_scifi_lover', this)">🚀 Sci-Fi Lover</button>
        <button class="user-tab" onclick="selectUser('u_comedy_buff', this)">😂 Comedy Buff</button>
        <button class="user-tab" onclick="selectUser('u_new_user', this)">👤 New User</button>
      </div>
    </div>
    <div>
      <div class="api-label" style="margin-bottom:10px">Device</div>
      <div class="device-tabs">
        <button class="device-tab active" onclick="selectDevice('desktop', this)">🖥 Desktop</button>
        <button class="device-tab" onclick="selectDevice('mobile', this)">📱 Mobile</button>
        <button class="device-tab" onclick="selectDevice('tv', this)">📺 TV</button>
      </div>
    </div>
    <button class="fetch-btn" id="fetchBtn" onclick="fetchRecommendations()">
      Get Recommendations →
    </button>
  </div>

  <!-- Context chips -->
  <div class="context-bar" id="ctxBar">
    <div class="ctx-chip"><span class="icon">🕐</span><span class="label">Time:</span><span class="value" id="ctxTime">–</span></div>
    <div class="ctx-chip"><span class="icon">📱</span><span class="label">Device:</span><span class="value" id="ctxDevice">–</span></div>
    <div class="ctx-chip"><span class="icon">🎭</span><span class="label">Mood:</span><span class="value" id="ctxMood">–</span></div>
    <div class="ctx-chip"><span class="icon">⚡</span><span class="label">Latency:</span><span class="value" id="ctxLatency">–</span></div>
  </div>

  <!-- Legend -->
  <div class="legend" id="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--vector)"></div>Vector Search (taste similarity)</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--collab)"></div>Collaborative Filtering</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--trending)"></div>Trending</div>
  </div>

  <!-- Grid -->
  <div class="grid" id="grid">
    <div class="empty">
      <div class="big">CINEAI</div>
      <p>Select a user and click <strong style="color:var(--accent)">Get Recommendations</strong></p>
    </div>
  </div>

</div>

<!-- Detail modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" style="position:relative">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <div class="modal-inner" id="modalInner"></div>
  </div>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let currentUser   = 'u_thriller_fan';
let currentDevice = 'desktop';
let useMock       = true;
let likedMovies   = new Set();

// ─── Mock data ────────────────────────────────────────────────────────────────
const MOCK = {
  u_thriller_fan: {
    user_id: 'u_thriller_fan',
    context: { hour_of_day: 22, device: 'desktop', mood_hint: 'Night owl — thử thriller hoặc mystery?' },
    items: [
      { id:'1', tmdb_id:496243, title:'Parasite', year:2019, rating:8.5, genres:['Thriller','Drama','Comedy'], overview:'A poor family schemes to become employed by a wealthy family and infiltrate their household by posing as unrelated, highly-qualified individuals.', poster_url:'https://image.tmdb.org/t/p/w500/7IiTTgloJzvGI1TAYymCfbfl3vT.jpg', score:0.94, source:'vector_search', reason:'Vì bạn thích Thriller (89% affinity) · Khớp cả hai thuật toán gợi ý' },
      { id:'2', tmdb_id:128, title:'Princess Mononoke', year:1997, rating:8.4, genres:['Animation','Fantasy','Action'], overview:'Ashitaka, a prince of the disappearing Emishi people, is inflicted with a deadly curse from a forest god consumed by hatred.', poster_url:'https://image.tmdb.org/t/p/w500/5Dm5CIAqGHzBdnqZXlHPJ8hhMBY.jpg', score:0.88, source:'vector_search', reason:'Vì bạn thích Drama có chiều sâu tâm lý' },
      { id:'3', tmdb_id:155, title:'The Dark Knight', year:2008, rating:9.0, genres:['Action','Crime','Drama','Thriller'], overview:'Batman raises the stakes in his war on crime. With the help of Lt. Jim Gordon and District Attorney Harvey Dent, Batman sets out to dismantle the remaining criminal organizations.', poster_url:'https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg', score:0.91, source:'collaborative', reason:'47 users có taste tương tự bạn đều yêu thích phim này · Khớp cả hai thuật toán gợi ý' },
      { id:'4', tmdb_id:37799, title:'The Social Network', year:2010, rating:7.8, genres:['Drama','Biography'], overview:'As Harvard student Mark Zuckerberg creates the social networking site that would become known as Facebook, he is sued by the twins who claimed he stole their idea.', poster_url:'https://image.tmdb.org/t/p/w500/n0ybibhJtQ5icDqTp8eRytcIHJx.jpg', score:0.82, source:'collaborative', reason:'23 users với taste tương tự bạn đều yêu thích phim này' },
      { id:'5', tmdb_id:680, title:'Pulp Fiction', year:1994, rating:8.9, genres:['Thriller','Crime'], overview:'The lives of two mob hitmen, a boxer, a gangster and his wife, and a pair of diner bandits intertwine in four tales of violence and redemption.', poster_url:'https://image.tmdb.org/t/p/w500/d5iIlFn5s0ImszYzBPb8JPIfbXD.jpg', score:0.87, source:'vector_search', reason:'Vì bạn thích Crime Thriller (85% affinity)' },
      { id:'6', tmdb_id:240, title:'The Godfather Part II', year:1974, rating:9.0, genres:['Drama','Crime'], overview:'The compelling sequel chronicles the story of Michael Corleone starting in 1958 and follows him through 1959.', poster_url:'https://image.tmdb.org/t/p/w500/hek3koDUyRQk7FIhPXsa6mT2Zc3.jpg', score:0.79, source:'trending', reason:'Đang được nhiều người xem trong tuần này' },
      { id:'7', tmdb_id:550, title:'Fight Club', year:1999, rating:8.8, genres:['Drama','Thriller'], overview:'A ticking-time-bomb insomniac and a slippery soap salesman channel primal male aggression into a shocking new form of therapy.', poster_url:'https://image.tmdb.org/t/p/w500/pB8BM7pdSp6B6Ih7QZ4DrQ3PmJK.jpg', score:0.85, source:'vector_search', reason:'Vì bạn thích psychological thriller — taste vector match 91%' },
      { id:'8', tmdb_id:19995, title:'No Country for Old Men', year:2007, rating:8.1, genres:['Crime','Drama','Thriller'], overview:'Violence and mayhem ensue after a hunter stumbles upon a drug deal gone wrong and more than two million dollars in cash near the Rio Grande.', poster_url:'https://image.tmdb.org/t/p/w500/6d5iBFQpkNTagXMDFXEIPwnhZbp.jpg', score:0.81, source:'collaborative', reason:'31 users có taste tương tự bạn yêu thích phim này' },
    ]
  },
  u_scifi_lover: {
    user_id: 'u_scifi_lover',
    context: { hour_of_day: 15, device: 'desktop', mood_hint: 'Giờ vàng — bộ phim hay đang chờ bạn' },

// ─── Functions ────────────────────────────────────────────────────────────────

function toggleMock() {
  useMock = !useMock;
  const btn = document.getElementById('mockToggle');
  btn.textContent = useMock ? 'Mock data ON' : 'Live API ON';
  btn.classList.toggle('active', useMock);
}

function selectUser(uid, el) {
  currentUser = uid;
  document.querySelectorAll('.user-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

function selectDevice(dev, el) {
  currentDevice = dev;
  document.querySelectorAll('.device-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

async function fetchRecommendations() {
  const btn = document.getElementById('fetchBtn');
  btn.textContent = 'Loading...';
  btn.classList.add('loading');
  showSkeletons();

  const t0 = performance.now();

  let data;
  try {
    if (useMock) {
      // Simulate network delay
      await new Promise(r => setTimeout(r, 900 + Math.random() * 400));
      const base = MOCK[currentUser] || MOCK['u_thriller_fan'];
      // Clone and override device
      data = JSON.parse(JSON.stringify(base));
      data.context.device = currentDevice;
      data.context.hour_of_day = new Date().getHours();
    } else {
      const base = document.getElementById('apiBase').value.replace(/\/$/, '');
      const url  = `${base}/api/v1/recommend/${currentUser}?limit=10&device=${currentDevice}`;
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      data = await resp.json();
    }
  } catch (err) {
    showError(err.message);
    btn.textContent = 'Get Recommendations →';
    btn.classList.remove('loading');
    return;
  }

  const latency = Math.round(performance.now() - t0);
  renderResults(data, latency);

  btn.textContent = 'Refresh →';
  btn.classList.remove('loading');
}

function showSkeletons() {
  const grid = document.getElementById('grid');
  grid.innerHTML = Array(8).fill(`<div class="skeleton skel-card"></div>`).join('');
}

function showError(msg) {
  document.getElementById('grid').innerHTML = `
    <div class="empty">
      <div class="big">ERR</div>
      <p style="color:var(--accent3)">⚠️ ${msg}</p>
      <p style="margin-top:8px;font-size:12px;color:var(--muted)">Toggle "Mock data ON" để dùng demo data</p>
    </div>`;
}

function renderResults(data, latency) {
  // Context bar
  document.getElementById('ctxTime').textContent = `${data.context.hour_of_day}:00`;
  document.getElementById('ctxDevice').textContent = data.context.device;
  document.getElementById('ctxMood').textContent = data.context.mood_hint;
  document.getElementById('ctxLatency').textContent = `${latency}ms`;
  document.getElementById('ctxBar').classList.add('visible');
  document.getElementById('legend').classList.add('visible');

  // Cards
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  if (!data.items || data.items.length === 0) {
    grid.innerHTML = `<div class="empty"><div class="big">EMPTY</div><p>No recommendations yet</p></div>`;
    return;
  }

  data.items.forEach((movie, i) => {
    const card = buildCard(movie);
    grid.appendChild(card);
    // Stagger animation
    setTimeout(() => card.classList.add('in'), 50 + i * 60);
  });
}

function buildCard(movie) {
  // Backend now returns an array of sources due to hybrid fusion
  const primarySource = Array.isArray(movie.source) ? movie.source[0] : movie.source;
  const sourceClass = {
    vector_search: 'source-vector',
    collaborative:  'source-collab',
    trending:       'source-trending',
  }[primarySource] || 'source-vector';

  const sourceLabel = {
    vector_search: 'Vector',
    collaborative:  'Collab',
    trending:       'Trend',
  }[primarySource] || primarySource;

  const pct = Math.round(movie.score * 100);
  const posterPath = movie.poster_path || movie.poster_url; // Handle both mock and live API formats
  const posterFallback = `https://via.placeholder.com/200x300/16161f/6b6b80?text=${encodeURIComponent(movie.title)}`;

  const card = document.createElement('div');
  card.className = 'card';
  card.onclick = () => openModal(movie);
  card.innerHTML = `
    <div class="card-poster">
      <img src="${posterPath || posterFallback}"
           onerror="this.src='${posterFallback}'"
           alt="${movie.title}" loading="lazy"/>
      <div class="score-badge">${pct}%</div>
      <div class="source-pill ${sourceClass}">${sourceLabel}</div>
    </div>
    <div class="card-body">
      <div class="card-title">${movie.title}</div>
      <div class="card-meta">${movie.year || '–'} · ${(movie.genres || []).slice(0,2).join(' · ')}</div>
      <div class="explain">${movie.reason}</div>
    </div>`;
  return card;
}

function openModal(movie) {
  const primarySource = Array.isArray(movie.source) ? movie.source[0] : movie.source;
  const pct = Math.round(movie.score * 100);
  const sourceColor = { vector_search:'var(--vector)', collaborative:'var(--collab)', trending:'var(--trending)' }[primarySource] || 'var(--accent)';
  const sourceLabel = { vector_search:'Vector Search', collaborative:'Collaborative Filtering', trending:'Trending' }[primarySource] || primarySource;
  const sourceIcon  = { vector_search:'', collaborative:'', trending:'' }[primarySource] || '⭐';
  const liked = likedMovies.has(movie.id);
  const posterPath = movie.poster_path || movie.poster_url;
  const posterFallback = `https://via.placeholder.com/200x300/16161f/6b6b80?text=${encodeURIComponent(movie.title)}`;

  document.getElementById('modalInner').innerHTML = `
    <div class="modal-poster">
      <img src="${posterPath || posterFallback}"
           onerror="this.src='${posterFallback}'"
           alt="${movie.title}"/>
    </div>
    <div class="modal-content">
      <div class="modal-title">${movie.title}</div>
      <div class="modal-year">
        ${movie.year || '–'} · ⭐ ${movie.rating?.toFixed(1) || '–'}
      </div>
      <div class="modal-genres">
        ${(movie.genres || []).map(g => `<span class="genre-tag">${g}</span>`).join('')}
      </div>
      <div class="modal-overview">${movie.overview || 'No overview available.'}</div>
      <div class="modal-divider"></div>
      <div class="explain-section-title">Why was this recommended?</div>
      <div class="explain-row">
        <span class="explain-icon">${sourceIcon}</span>
        <div>
          <div style="font-size:11px;color:${sourceColor};text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;font-family:'DM Mono',monospace">${sourceLabel}</div>
          <div class="explain-text">${movie.reason}</div>
        </div>
      </div>
      <div class="score-row">
        <span class="score-label">Match score</span>
        <div class="score-bar-wrap">
          <div class="score-bar" id="modalScoreBar" style="width:0%"></div>
        </div>
        <span class="score-val">${pct}%</span>
      </div>
      <button class="like-btn ${liked ? 'liked' : ''}" id="likeBtn" onclick="toggleLike('${movie.id}', '${movie.user_id || currentUser}', '${movie.id}')">
        ${liked ? '❤️ Đã thích' : '🤍 Thích'}
      </button>
    </div>`;

  document.getElementById('modal').classList.add('open');

  // Animate score bar
  setTimeout(() => {
    const bar = document.getElementById('modalScoreBar');
    if (bar) bar.style.width = pct + '%';
  }, 100);
}

function toggleLike(movieId, userId, tmdbId) {
  const btn = document.getElementById('likeBtn');
  if (likedMovies.has(movieId)) {
    likedMovies.delete(movieId);
    btn.innerHTML = '🤍 Thích';
    btn.classList.remove('liked');
  } else {
    likedMovies.add(movieId);
    btn.innerHTML = '❤️ Đã thích';
    btn.classList.add('liked');

    // In real app: POST /api/v1/events
    if (!useMock) {
      const base = document.getElementById('apiBase').value.replace(/\/$/, '');
      fetch(`${base}/api/v1/events`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          user_id:  currentUser,
          movie_id: tmdbId,
          type:     'like',
          device:   currentDevice,
        })
      }).catch(console.error);
    } else {
      console.log('[Mock] POST /api/v1/events', { user_id: currentUser, movie_id: tmdbId, type: 'like' });
    }
  }
}

function closeModal(e) {
  if (e.target === document.getElementById('modal')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modal').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

// Auto-load on first visit
fetchRecommendations();
</script>
